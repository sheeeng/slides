on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0" # At 00:00 on Sunday.
  workflow_dispatch:
permissions: {}
concurrency:
  group: "deploy-pages"
  cancel-in-progress: true
jobs:
  build-slides:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        slide:
          - name: running-kernel-based-virtual-machine
          - name: governing-azure-resources-with-policy
          - name: tracking-nixpkgs-merged-pull-requests
          - name: demystifying-the-nix-store
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
      - name: Install Dependencies
        working-directory: slides/${{ matrix.slide.name }}
        run: npm ci
      - name: Build Slides
        working-directory: slides/${{ matrix.slide.name }}
        run: npm run build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        with:
          name: slides-${{ matrix.slide.name }}
          path: slides/${{ matrix.slide.name }}/public
  deploy:
    needs: [build-slides]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: index.html
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slides-running-kernel-based-virtual-machine
          path: public/slides/running-kernel-based-virtual-machine
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slides-governing-azure-resources-with-policy
          path: public/slides/governing-azure-resources-with-policy
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slides-tracking-nixpkgs-merged-pull-requests
          path: public/slides/tracking-nixpkgs-merged-pull-requests
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slides-demystifying-the-nix-store
          path: public/slides/demystifying-the-nix-store
      - name: Prepare Public Directory
        run: |-
          mkdir --parents public
          cp index.html public/index.html
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: public/
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
