version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
  - package-ecosystem: npm
    directories:
      - "/demystifying-the-nix-store"
      - "/tracking-nixpkgs-pull-requests"
    schedule:
      interval: "daily"
    groups:
      npm:
        patterns:
          - "*"
    labels:
      - dependencies
    versioning-strategy: increase
