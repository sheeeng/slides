version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
  - package-ecosystem: npm
    directories:
      - "/slides/demystifying-the-nix-store"
      - "/slides/governing-azure-resources-with-policy"
      - "/slides/running-kernel-based-virtual-machine"
      - "/slides/tracking-nixpkgs-merged-pull-requests"
    schedule:
      interval: "daily"
    groups:
      npm:
        patterns:
          - "*"
    labels:
      - dependencies
    versioning-strategy: increase
